x-app: &app
  build: .
  image: euieinvest-quant:latest
  runtime: nvidia
  environment:
    - NVIDIA_VISIBLE_DEVICES=all
    - NVIDIA_DRIVER_CAPABILITIES=compute,utility
  volumes:
    - .:/workspace
  working_dir: /workspace

services:
  dev:
    <<: *app
    stdin_open: true
    tty: true
    command: bash

  test:
    <<: *app
    command: uv run pytest -v

  discover:
    <<: *app
    command: uv run python scripts/discover.py
