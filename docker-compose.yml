x-app: &app
  build: .
  image: euieinvest-quant:latest
  runtime: nvidia
  environment:
    - NVIDIA_VISIBLE_DEVICES=all
    - NVIDIA_DRIVER_CAPABILITIES=compute,utility
  volumes:
    - .:/workspace
  working_dir: /workspace

services:
  dev:
    <<: *app
    stdin_open: true
    tty: true
    command: bash

  test:
    <<: *app
    command: uv run pytest -v

  discover:
    <<: *app
    command: uv run python scripts/discover.py

  docs:
    <<: *app
    ports:
      - "127.0.0.1:8000:8000"
    command: uv run mkdocs serve --dev-addr 0.0.0.0:8000
